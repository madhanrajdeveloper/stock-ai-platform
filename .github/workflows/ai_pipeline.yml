name: AI Stock Pipeline

on:
  schedule:
    - cron: "0 1 * * *"   # Runs every day
  workflow_dispatch:

jobs:
  run-ai-pipeline:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        pip install -r backend/requirements.txt

    - name: Run Fetch Market Data
      run: |
        cd scripts
        python fetch_market_data.py

    - name: Train AI Models
      run: |
        cd scripts
        python daily_training.py

    - name: Run Predictions
      run: |
        cd scripts
        python run_predictions.py